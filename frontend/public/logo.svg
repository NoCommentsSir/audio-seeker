<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="pyGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#306998"/>
      <stop offset="100%" stop-color="#FFD43B"/>
    </linearGradient>
    <!-- Фильтр свечения для волны -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="200" height="200" rx="40" fill="#0d1117"/>
  
  <!-- Столбики эквалайзера -->
  <g fill="url(#pyGrad)">
    <rect x="45" y="55" width="16" height="90" rx="8"/>
    <rect x="70" y="25" width="16" height="150" rx="8"/>
    <rect x="95" y="45" width="16" height="110" rx="8"/>
    <rect x="120" y="65" width="16" height="70" rx="8"/>
  </g>
  
  <!-- Звуковая волна, проходящая сквозь столбики -->
  <path d="M 30,100 C 45,60 65,140 80,100 C 95,60 115,140 130,100 C 145,60 165,140 170,100" 
        stroke="url(#pyGrad)" 
        stroke-width="4" 
        fill="none" 
        stroke-linecap="round"
        filter="url(#glow)"
        opacity="0.95"/>
</svg>